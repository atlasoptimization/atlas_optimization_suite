services:
  backend:
    build:
      context: .
      dockerfile: deployments/local_docker/backend.Dockerfile
    environment:
      ATLAS_CORS_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: deployments/local_docker/frontend.Dockerfile
      args:
        VITE_ATLAS_BACKEND_URL: "http://localhost:8000"
    depends_on:
      - backend
    ports:
      - "8080:80"
